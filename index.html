<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Vệ Tinh – Tick | Long Châu</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #F2FAF6;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    /* iframe chiếm toàn màn hình */
    #dash-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    /* màn hình chờ trong lúc iframe tải */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #0B3D78;
      background: #F2FAF6;
      z-index: 1;
    }
    #loading .spinner {
      width: 38px; height: 38px;
      border: 4px solid #D6EEE2;
      border-top-color: #0E7C7B;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading p { font-size: 14px; font-weight: 600; margin: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Màn hình chờ, tự ẩn khi iframe tải xong -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Đang tải Dashboard Vệ Tinh – Tick…</p>
  </div>

  <!--
    ⬇️ THAY LINK BÊN DƯỚI bằng link Web App Apps Script của bạn.
    Link có dạng: https://script.google.com/macros/s/AKfycb..../exec
    (Lấy ở: Apps Script → Deploy → Manage deployments → copy Web app URL)
  -->
  <iframe
    id="dash-frame"
    src="https://script.google.com/macros/s/AKfycbxtgyOnC4iQVv5hJJsOY13Jndmfzow7VuFLzlFtGiZZ0OiOdDy8hNiGbvwn6IUquKhx/exec"
    onload="document.getElementById('loading').style.display='none';"
    allow="clipboard-write">
  </iframe>
</body>
</html>
